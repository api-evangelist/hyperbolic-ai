specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Hyperbolic
providerId: hyperbolic-ai
created: '2026-05-25'
modified: '2026-05-25'
reconciled: true
tags:
  - AI
  - GPU
  - Inference
  - Marketplace
description: 'Reconciled plans and per-token / per-image / per-GPU-hour pricing for the Hyperbolic Serverless
  Inference and GPU Marketplace services. Source: hyperbolic.ai, docs.hyperbolic.ai, and third-party
  pricing trackers as of May 2026.'
sources:
  - https://www.hyperbolic.ai/
  - https://docs.hyperbolic.ai/inference/overview
  - https://docs.hyperbolic.ai/on-demand/overview
  - https://huggingface.co/docs/inference-providers/en/providers/hyperbolic
plans:
  - id: hyperbolic-basic
    name: Basic
    type: tier
    description: Free tier — 60 requests per minute, community support, no minimum deposit.
    entries:
      - label: Request rate
        name: rpm
        type: metered
        metric: requests
        limit: 60
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 60 requests/minute
      - name: Community support
      - name: No minimum deposit
  - id: hyperbolic-pro
    name: Pro
    type: tier
    description: Pro tier — 600 requests per minute, priority and email support, requires at least $5 deposit.
    entries:
      - label: Request rate
        name: rpm
        type: metered
        metric: requests
        limit: 600
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Minimum deposit
        name: deposit_minimum
        type: prepaid
        metric: usd
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '5.00'
        userMultiplied: false
    elements:
      - name: 600 requests/minute
      - name: Priority + email support
      - name: $5 minimum deposit
  - id: hyperbolic-enterprise
    name: Enterprise
    type: tier
    description: Enterprise tier — unlimited rate limits, 24/7 dedicated support, custom contracts.
    entries:
      - label: Request rate
        name: rpm
        type: metered
        metric: requests
        limit: -1
        timeFrame: minute
        geo: global
        unit: 1
        price: 'Call'
        userMultiplied: false
    elements:
      - name: Unlimited rate limits
      - name: 24/7 dedicated support
      - name: Custom contracts and SLA
  - id: hyperbolic-inference-llama-405b
    name: Llama 3.1 405B Inference
    type: usage-based
    description: Per-million-token pricing for Meta-Llama-3.1-405B-Instruct.
    entries:
      - label: Tokens (input + output)
        name: tokens
        type: metered
        metric: tokens
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: '4.00'
        userMultiplied: false
